{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <meta property="og:image" content="{{ config.site_url }}images/docs_og.png" />
  <meta property="og:title" content="{% if page and page.title %}{{ page.title }} – simplegrad{% else %}simplegrad{% endif %}" />
  <meta property="og:description" content="{{ config.site_description }}" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="{{ config.site_url }}images/docs_og.png" />
{% endblock %}

{% block scripts %}
  {{ super() }}
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      // Force all details elements open
      document.querySelectorAll("details").forEach(function (el) {
        el.setAttribute("open", "");
      });

    });
  </script>
{% endblock %}
